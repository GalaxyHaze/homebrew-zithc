name: Update Homebrew Formula

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  update-brew:
    if: github.event.action == 'new-release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          URL="${{ github.event.client_payload.url }}"
          SHA256="${{ github.event.client_payload.sha256 }}"

          sed -i "s|url \".*\"|url \"$URL\"|" Formula/zith.rb
          sed -i "s|version \".*\"|version \"$VERSION\"|" Formula/zith.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" Formula/zith.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zith.rb
          VERSION="${{ github.event.client_payload.version }}"
          git diff --staged --quiet || git commit -m "chore: update formula to v${VERSION}"
          git push
